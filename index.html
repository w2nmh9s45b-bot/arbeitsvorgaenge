<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0b5cad">
<meta name="apple-mobile-web-app-title" content="Arbeitsvorgänge">
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
<link rel="icon" href="icons/icon-192.png">
<title>Arbeitsvorgänge – SB Organisation (1.1.2)</title>
<style>
:root{
  --bg:#f2f4f8; --card:#ffffff; --ink:#1a2330; --mut:#5b6b7d; --line:#e2e8f0;
  --acc:#0b5cad; --acc2:#e8f1fb; --ok:#1e8e3e; --ok2:#e6f4ea; --warn:#b3560c; --warn2:#fdf0e3;
  --danger:#c0392b; --shadow:0 1px 3px rgba(16,34,60,.08),0 4px 14px rgba(16,34,60,.06);
}
@media (prefers-color-scheme: dark){
  :root{ --bg:#10151c; --card:#1a212b; --ink:#e8edf4; --mut:#94a3b6; --line:#2a3442;
    --acc:#5aa2e8; --acc2:#182c42; --ok:#5bc078; --ok2:#15301d; --warn:#e8a75a; --warn2:#33240f; --danger:#e07060;
    --shadow:0 1px 3px rgba(0,0,0,.4); }
}
*{box-sizing:border-box; -webkit-tap-highlight-color:transparent}
html,body{margin:0;padding:0;background:var(--bg);color:var(--ink);
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  font-size:16px; line-height:1.45; -webkit-text-size-adjust:100%}
#app{max-width:640px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column}
/* Header */
header{position:sticky;top:0;z-index:20;background:var(--acc);color:#fff;
  padding:calc(env(safe-area-inset-top,0px) + 10px) 12px 10px 12px;box-shadow:var(--shadow)}
.hrow{display:flex;align-items:center;gap:8px}
.hbtn{background:rgba(255,255,255,.16);border:none;color:#fff;border-radius:10px;
  min-width:44px;height:38px;font-size:15px;font-weight:600;padding:0 10px;cursor:pointer;flex:0 0 auto}
.hbtn:active{background:rgba(255,255,255,.32)}
.htitle{flex:1;text-align:center;font-weight:700;font-size:15.5px;overflow:hidden;
  text-overflow:ellipsis;white-space:nowrap;padding:0 2px}
.hsub{text-align:center;font-size:12px;opacity:.85;margin-top:2px}
.pbar{height:4px;background:rgba(255,255,255,.25);border-radius:2px;margin-top:8px;overflow:hidden}
.pfill{height:100%;background:#fff;border-radius:2px;transition:width .25s}
/* Main */
main{flex:1;padding:14px 14px calc(96px + env(safe-area-inset-bottom,0px)) 14px}
.card{background:var(--card);border:1px solid var(--line);border-radius:14px;
  box-shadow:var(--shadow);padding:14px;margin-bottom:12px}
.tile{display:flex;align-items:center;gap:12px;width:100%;text-align:left;background:var(--card);
  border:1px solid var(--line);border-radius:14px;box-shadow:var(--shadow);padding:14px;margin-bottom:10px;
  cursor:pointer;color:var(--ink);font-size:16px}
.tile:active{background:var(--acc2)}
.tile .ic{font-size:26px;flex:0 0 34px;text-align:center}
.tile .tt{flex:1}.tile .tt b{display:block;font-size:16px}
.tile .tt small{color:var(--mut);font-size:13px;display:block;margin-top:2px}
.tile .arr{color:var(--mut);font-size:20px;flex:0 0 auto}
.badge{display:inline-block;background:var(--acc2);color:var(--acc);font-size:12px;font-weight:700;
  border-radius:7px;padding:2px 8px;margin-right:6px}
.badge.done{background:var(--ok2);color:var(--ok)}
h2{font-size:19px;margin:4px 0 12px}
h3{font-size:16px;margin:0 0 8px}
.sec{font-size:13px;font-weight:700;color:var(--mut);text-transform:uppercase;
  letter-spacing:.04em;margin:18px 4px 8px}
.info{background:var(--acc2);border-left:4px solid var(--acc);border-radius:0 10px 10px 0;
  padding:10px 12px;font-size:14px;margin:0 0 12px;color:var(--ink)}
.info b{color:var(--acc)}
.warnbox{background:var(--warn2);border-left:4px solid var(--warn);border-radius:0 10px 10px 0;
  padding:10px 12px;font-size:14px;margin:0 0 12px}
.hint{font-size:13px;color:var(--mut);margin:4px 0 0}
details{margin:8px 0;background:var(--bg);border-radius:10px;padding:8px 12px;font-size:14px}
details summary{cursor:pointer;font-weight:600;color:var(--acc)}
details[open]{padding-bottom:10px}
.chip{display:inline-block;background:var(--bg);border:1px solid var(--line);border-radius:8px;
  font-size:12.5px;padding:3px 8px;margin:2px 4px 2px 0;color:var(--mut)}
/* Items */
.item{padding:11px 4px;border-bottom:1px solid var(--line)}
.item:last-child{border-bottom:none}
.ilabel{font-size:15.5px;font-weight:500}
.ihelp{font-size:13px;color:var(--mut);margin-top:3px}
.checkrow{display:flex;gap:11px;align-items:flex-start;cursor:pointer}
.cbox{flex:0 0 26px;height:26px;border:2px solid var(--mut);border-radius:8px;margin-top:1px;
  display:flex;align-items:center;justify-content:center;font-size:17px;color:#fff;background:transparent}
.checkrow.on .cbox{background:var(--ok);border-color:var(--ok)}
.checkrow.na .cbox{background:var(--mut);border-color:var(--mut)}
.checkrow .cwrap{flex:1}
.nabtn{border:none;background:none;color:var(--mut);font-size:12.5px;text-decoration:underline;
  padding:4px 0 0;cursor:pointer}
.opts{display:flex;flex-direction:column;gap:8px;margin-top:9px}
.opt{border:1.5px solid var(--line);background:var(--card);border-radius:11px;padding:11px 12px;
  text-align:left;font-size:15px;cursor:pointer;color:var(--ink);display:flex;gap:9px;align-items:center}
.opt .dot{flex:0 0 20px;height:20px;border:2px solid var(--mut);border-radius:50%}
.opt.multi .dot{border-radius:6px}
.opt.sel{border-color:var(--acc);background:var(--acc2)}
.opt.sel .dot{background:var(--acc);border-color:var(--acc);position:relative}
.opt.sel .dot::after{content:"✓";color:#fff;font-size:13px;font-weight:800;position:absolute;
  left:50%;top:50%;transform:translate(-50%,-52%)}
input[type=text],input[type=number],input[type=date],textarea,select{
  width:100%;font-size:16px;padding:11px 12px;border:1.5px solid var(--line);border-radius:11px;
  background:var(--card);color:var(--ink);margin-top:8px;font-family:inherit}
input:focus,textarea:focus,select:focus{outline:2px solid var(--acc);border-color:var(--acc)}
textarea{min-height:74px;resize:vertical}
.rangewrap{display:flex;align-items:center;gap:12px;margin-top:10px}
input[type=range]{flex:1;accent-color:var(--acc);height:34px}
.rval{flex:0 0 auto;min-width:64px;text-align:center;background:var(--acc2);color:var(--acc);
  font-weight:800;border-radius:9px;padding:7px 8px;font-size:15px}
/* Calc */
.calcout{background:var(--ok2);border:1px solid var(--ok);border-radius:11px;padding:11px 12px;
  margin-top:10px;font-size:15px}
.calcout b{font-size:17px}
.ftable{width:100%;border-collapse:collapse;font-size:13.5px;margin-top:10px}
.ftable td,.ftable th{border-bottom:1px solid var(--line);padding:7px 5px;text-align:left;vertical-align:top}
.ftable th{color:var(--mut);font-size:12px;text-transform:uppercase}
.ftable .dt{white-space:nowrap;font-weight:700}
.ftable tr.key td{color:var(--acc);font-weight:600}
.addrow{border:1.5px dashed var(--acc);color:var(--acc);background:none;border-radius:11px;
  padding:10px;width:100%;font-size:14.5px;font-weight:600;cursor:pointer;margin-top:10px}
.delrow{border:none;background:none;color:var(--danger);font-size:13px;cursor:pointer;padding:4px 0}
/* Footer nav */
footer{position:fixed;bottom:0;left:0;right:0;z-index:20;background:var(--card);
  border-top:1px solid var(--line);box-shadow:0 -4px 14px rgba(16,34,60,.08)}
.frow{max-width:640px;margin:0 auto;display:flex;gap:10px;
  padding:10px 14px calc(10px + env(safe-area-inset-bottom,0px)) 14px}
.fbtn{flex:1;border:none;border-radius:12px;font-size:16px;font-weight:700;padding:14px 8px;cursor:pointer}
.fback{background:var(--bg);color:var(--ink);border:1.5px solid var(--line)}
.fnext{background:var(--acc);color:#fff}
.fnext:disabled{opacity:.45}
.fhome{flex:0 0 56px;background:var(--bg);border:1.5px solid var(--line);color:var(--ink);font-size:20px}
.fbtn:active{transform:scale(.98)}
/* Buttons misc */
.btn{display:block;width:100%;border:none;border-radius:12px;font-size:16px;font-weight:700;
  padding:14px;cursor:pointer;margin-top:10px}
.bpri{background:var(--acc);color:#fff}
.bok{background:var(--ok);color:#fff}
.bsec{background:var(--bg);color:var(--ink);border:1.5px solid var(--line)}
.bdanger{background:none;color:var(--danger);border:1.5px solid var(--danger)}
.undo{border:none;background:none;color:var(--acc);font-size:13.5px;font-weight:600;
  cursor:pointer;padding:6px 0;text-decoration:underline}
.search{width:100%;font-size:16px;padding:12px;border:1.5px solid var(--line);border-radius:12px;
  background:var(--card);color:var(--ink);margin-bottom:12px}
.toast{position:fixed;left:50%;bottom:110px;transform:translateX(-50%);background:var(--ink);
  color:var(--bg);padding:10px 18px;border-radius:12px;font-size:14.5px;font-weight:600;z-index:50;
  opacity:0;transition:opacity .25s;pointer-events:none;max-width:88%;text-align:center}
.toast.show{opacity:1}
.qmrow{display:flex;gap:10px;align-items:flex-start;padding:9px 2px;border-bottom:1px solid var(--line);font-size:14.5px}
.qmrow:last-child{border-bottom:none}
.done-icon{font-size:52px;text-align:center;margin:6px 0 2px}
.center{text-align:center}
.small{font-size:13px;color:var(--mut)}
</style>
</head>
<body>
<div id="app">
  <header id="hdr"></header>
  <main id="main"></main>
</div>
<footer id="ftr"></footer>
<div class="toast" id="toast"></div>

<script>
"use strict";
/* ============================================================

/* ---------- Bereiche (Aufgabengebiete) ---------- */
const BEREICHE=[
 {id:"b1",nr:1,icon:"🏛️",titel:"Aufbau- und Organisationsstruktur",
  kurz:"Strukturen, Leitungsspannen, Organigramm, Stellenbeschreibungen",
  grund:["Sachzusammenhang: zusammengehörende Aufgaben in eine Einheit; keine personenbezogenen Konstruktionen (Grundsätze RH Ziff. 8.1).",
   "Organisatorisches Minimum: wenige Ebenen, große Einheiten (Ziff. 8.2). Mindestleitungsspanne Ortsinstanz 1:12; SRH-Modelloptimum für Städte 10–20.000 EW: 1:6–1:7.",
   "Einheit der Auftragserteilung: jede Person nur einer Führungskraft unterstellt (Ziff. 8.4). AKV-Prinzip: Aufgabe, Kompetenz, Verantwortung auf einer Ebene (Ziff. 8.5).",
   "Stabsstellen nur bei dauerhaftem Unterstützungsbedarf der Leitung, keine operativen Daueraufgaben (Ziff. 8.6).",
   "Strukturänderungen erst nach Organisationsuntersuchung (Ziff. 8.7). Grunddokumente aktuell halten: Organigramm, GVP, ADGA, Aufgabenkatalog, Prozesslandkarte.",
   "ADGA Ziff. 6.2/7.2: Organisationsaufgaben liegen bei FB 1; frühzeitige Beteiligung bei allen Struktur-Maßnahmen. Freigabeweg: Büroleiter → OB (Ziff. 48.3)."],
  aufgaben:[
   {t:"Organigramm & Geschäftsverteilung",avs:["av11","av14"]},
   {t:"Analyse & Reorganisation",avs:["av12","av13"]},
   {t:"Beteiligung & laufende Regelungen",avs:["av15","av16"]}]},
 {id:"b2",nr:2,icon:"🔄",titel:"Prozessmanagement und Ablauforganisation",
  kurz:"Prozesslandkarte, Ist-Aufnahme, Optimierung, Umsetzung, Controlling",
  grund:["Leitmodell BMI-Leitfadenreihe: Auswahl → Erhebung → Dokumentation/Analyse → Optimierung → Umsetzung → Steuerung → Weiterentwicklung.",
   "Rollen vorab klären: Prozessmanager (= SG 1.1.2), Prozesseigentümer (FB-/SG-Leitung), Prozessverantwortliche (Sachbearbeitung), Fachexperten, Modellierer.",
   "Methodische Reihenfolge (RH Ziff. 5.1): Aufgabenkritik → Prozessoptimierung → Personalbedarf. Nie Personal auf ungeprüften Ist-Zustand bemessen.",

  kurz:"Organisationsuntersuchungen, PBE-Formel, Stellenbewertung, Stellenplan",
  grund:["Kernformel (Leitsätze RH 2024): Personalbedarf (VZÄ) = (Jahresmenge × mittlere Bearbeitungszeit) ÷ Jahresarbeitszeit einer Normalarbeitskraft.",
   "Verteilzeiten pauschal 10–15 % auf die Grundzeit; Leerzeiten sind kein Verteilzeitgrund; keine Doppelerfassung. KLR-Zeitbuchungen sind als Bearbeitungszeiten ungeeignet.",
   "JAZ verwaltungsspezifisch berechnen (Soll-Arbeitszeit × Nettoarbeitstage, RLP-Feiertage, eigene Krankenstatistik); nach Laufbahngruppen differenzieren. Kommunaler Anhalt SRH: ~123 Std. Nettoleistungszeit/Monat.",
   "Quantifizierbare Aufgaben analytisch, dispositiv-kreative per analytischem Schätzen (ggf. PERT). Teilerhebung vor Vollerhebung. Max. ~10 Katalogpositionen je Arbeitsplatz bei Zeitaufnahmen.",
   "Benchmarks (RH RLP 2016/2025, SRH 2,32+0,08 VK je 1.000 EW) nur zur Plausibilisierung, nie als alleinige Begründung. Mehr-/Minderbedarfe konkret begründen, keine Bagatellen.",

  aufgaben:[
   {t:"Untersuchung planen & erheben",avs:["av31","av32"]},

  grund:["Rechtsrahmen: § 93 Abs. 3 GemO (sparsam & wirtschaftlich), § 10 GemHVO + VV (Folgekosten, Dringlichkeit vor Investitionen). Methodenstandard: Arbeitsanleitung zu § 7 BHO.",

av21:{id:"av21",b:"b2",nr:"AV 2.1",titel:"Prozesslandkarte aufbauen und Prozesse auswählen",
 ziel:"Überblick über alle Prozesse (Führungs-/Kern-/Unterstützungsprozesse) und transparente, gemeinsam getragene Priorisierung, welche Prozesse zuerst untersucht werden.",
 ausloeser:["Einführung/Ausbau des Prozessmanagements","Jährliche Priorisierungsrunde","Anstehende Digitalisierungsvorhaben (OZG/E-Government)","Aufforderung der Leitung"],
 grundlagen:["BMI-Leitfaden Prozesslandkarte","BMI-Leitfaden Auswahl","Grundsätze RH Ziff. 7.1 (Prozessüberblick Pflicht)","FIM-Portal (Referenzprozesse)"],
 beteiligte:["FB-Leitungen (Workshops)","Büroleiter/OB (Freigabe)","Fachbereiche (Datenlieferung)"],
 steps:[
  {t:"1. Ziele und Darstellungsform festlegen",
   info:"Pragmatisch bleiben: eine Seite, Ebenen Landkarte → Hauptprozesse → Teilprozesse. PowerPoint/Visio genügt, wenn keine Modellierungssoftware da ist.",
   items:[
    {ty:"choice",l:"Hauptzweck der Landkarte:",multi:true,opts:["Interner Überblick","Außendarstellung","Abgrenzung der Prozesse","Basis für Auswahl/Optimierung"]},
    {ty:"check",l:"Darstellungskonvention festgelegt (Ebenen, Werkzeug)"}]},
  {t:"2. Erhebungsweg festlegen",
   info:"BMI-Empfehlung: Top-down mit grobem Entwurf starten, dann schrittweise verfeinern. Grundsatzdiskussionen über Kern- vs. Unterstützungsprozess vermeiden.",
   items:[
    {ty:"choice",l:"Erhebungsweg:",opts:["Top-down (Workshops mit FB-Leitungen) – empfohlen","Bottom-up (Erhebung bei Sachbearbeitung)","Kombination"],
     help:"Top-down: schneller, strategisch – Akzeptanz der Beschäftigten aktiv sichern. Bottom-up: höhere Akzeptanz, aufwendiger."}]},
  {t:"3. Prozesse identifizieren und einordnen",
   info:"Faustformeln: Externe Kunden → Kernprozess; Zentralaufgaben → Unterstützung; Frage: Hätte der Prozess allein Existenzberechtigung? → Kern.",
   items:[
    {ty:"check",l:"Quellen ausgewertet: GVP, Organigramm, Produkt-/Leistungskatalog, Aufgabenkatalog, QM-Unterlagen"},
    {ty:"check",l:"Dreiteilung vorgenommen: Führungs- / Kern- / Unterstützungsprozesse"},
    {ty:"check",l:"Je Prozess dokumentiert: Input – Inhalt – Output, Schnittstellen, beteiligte Einheiten"},
    {ty:"check",l:"FIM-Portal auf vorhandene Referenzprozesse geprüft",help:"fimportal.de – Übernahme spart eigene Erhebung"}]},
  {t:"4. Auswahlkriterien sammeln und gewichten (Workshop 1)",
   info:"Max. 15 Kriterien brainstormen, im Workshop per Mehr-Punkt-Abfrage auf ca. 6 reduzieren und Gewichte berechnen.",
   items:[
    {ty:"choice",l:"Typische Kriterien (Auswahl für die Liste):",multi:true,
     opts:["Ressourcenbindung (Personal/Kosten)","Fallzahl","Politisch-strategische Bedeutung","Vermutete Schwachstellen/Beschwerden","Schnittstellen-/Medienbrüche","Bürger-/Kundenrelevanz","Digitalisierungspotenzial","Prüfungsfeststellungen"]},
    {ty:"check",l:"Ausschlusskriterien angewandt",help:"Gesetzlich fixierter Ablauf, anstehende Rechts-/IT-Änderung, geringes Volumen, bereits analysiert, bald wegfallend"},
    {ty:"check",l:"Workshop 1 durchgeführt: ~6 Kriterien + Gewichte beschlossen"}]},
  {t:"5. Prozesse bewerten und priorisieren (Workshop 2)",
   info:"Nutzwertanalyse-Logik: qualitative Kriterien per Punktabfrage (begrenzte Punkte je Person, max. 2 je Prozess), quantitative vorab aus Daten. Gemeinsame Erarbeitung = Akzeptanz.",
   items:[
    {ty:"check",l:"Bewertung im Workshop durchgeführt (Normierung, gewichtete Summe)"},
    {ty:"text",l:"Top-Prozesse der Rangfolge",ph:"1. …  2. …  3. …",long:true}]},
  {t:"6. Freigabe und Pflege",
   info:"Landkarte und Priorisierung sind lebende Dokumente – Jahresturnus für Aktualisierung festlegen.",
   items:[
    {ty:"check",l:"Priorisierungsliste + Landkarte mit Büroleiter/OB abgestimmt und freigegeben"},
    {ty:"check",l:"Im Intranet veröffentlicht"},
    {ty:"check",l:"Jahresturnus für Aktualisierung/Neupriorisierung gesetzt"}]}],
 ergebnis:"Aktuelle Prozesslandkarte (Führungs-/Kern-/Unterstützungsprozesse) + freigegebene, begründete Priorisierungsliste.",
 qualitaet:["Landkarte vollständig, aber abstrakt genug für eine Seite","Auswahlverfahren transparent dokumentiert (Kriterien, Gewichte, Punkte)","Wirtschaftlichkeit beachtet (Nutzen je Untersuchungsaufwand)"]},

av22:{id:"av22",b:"b2",nr:"AV 2.2",titel:"Ist-Aufnahme und Modellierung eines Geschäftsprozesses",

    {ty:"check",l:"Zeiten laufend erfasst (Bearbeitungs-, Liege-, Transportzeiten)"},
    {ty:"check",l:"Mengen (Fallzahlen) und Sonderfälle mit Häufigkeit erfasst"},

av23:{id:"av23",b:"b2",nr:"AV 2.3",titel:"Schwachstellenanalyse und Soll-Konzeption",

av57:{id:"av57",b:"b5",nr:"AV 5.7",titel:"Wahlvorschläge, Unterschriften, Wahlausschuss",

 ausloeser:["Bekanntmachung der Aufforderung (T−69)","Eingehende Wahlvorschläge bis T−48, 18 Uhr","Beratungsanfragen von Parteien/Wählergruppen/Einzelbewerbern"],
 grundlagen:["§§ 15–25, § 8 KWG; KWO","Leitfäden des Landeswahlleiters für Wahlvorschlagsträger","Bei BTW/LTW/EP: nur Service-/Bescheinigungsfunktion"],
 beteiligte:["Wahlleiter (OB) + Wahlausschuss","Vertrauenspersonen","Landeswahlleiter","Aufsichtsbehörde","Druckerei"],
 steps:[
  {t:"1. Beratung und Formulare (ab T−69)",
   info:"Amtliche Formblätter kostenfrei ausgeben; Mindestzahl der Unterstützungsunterschriften öffentlich bekanntmachen; Befreiungen nach § 16 Abs. 3 KWG erläutern; neue Parteien: Anzeige beim LWL bis T−54.",
   items:[
    {ty:"check",l:"Formblätter bereit (Wahlvorschlag, Zustimmungserklärungen, Unterschriften, Aufstellungsniederschrift)"},
    {ty:"check",l:"Mindest-Unterschriftenzahlen bekannt gemacht"},
    {ty:"check",l:"Alle Träger gleich beraten – Beratungsinhalte dokumentiert"}]},
  {t:"2. Bescheinigungen ausstellen",
   info:"Wahlrechtsbescheinigungen für Unterzeichner + Wählbarkeitsbescheinigungen für Bewerber (§ 20 KWG) – Melderegisterabgleich, zügig (Fristnähe!), Doppelunterzeichnung kontrollieren.",
   items:[
    {ty:"check",l:"Bescheinigungsprozess läuft (zügig, dokumentiert)"},
    {ty:"check",l:"Doppelunterzeichnungs-Kontrolle aktiv"}]},
  {t:"3. Eingang und Vorprüfung der Wahlvorschläge",
   info:"Eingangsvermerk mit Datum UND Uhrzeit (18-Uhr-Frist T−48!). Wesentliche Mängel sind nur bis T−48 heilbar, formale bis zur Zulassungsentscheidung – Mängel sofort der Vertrauensperson mitteilen.",
   items:[
    {ty:"check",l:"Eingänge mit Datum/Uhrzeit dokumentiert"},
    {ty:"check",l:"Unverzügliche Vorprüfung: Form, Inhalt, Zustimmungserklärungen, Aufstellungsverfahren (Niederschrift), Unterschriftenzahl"},
    {ty:"check",l:"Mängelmitteilungen an Vertrauenspersonen dokumentiert (mit Uhrzeit)"}]},
  {t:"4. Wahlausschuss organisieren (Geschäftsstelle)",
   info:"Öffentliche Zulassungssitzung T−47 bis T−41; bei Zurückweisung sofortige Unterrichtung von Aufsichtsbehörde und Vertrauensperson (Beschwerdeweg!). Danach: Listennummern nach § 24 KWG, Stimmzettel-Druckfreigabe im Vier-Augen-Prinzip.",
   items:[
    {ty:"check",l:"Beisitzer berufen, Einladung bis T−47, Sitzung fristgerecht (öffentlich, Niederschrift)"},
    {ty:"check",l:"Vorlagen je Wahlvorschlag mit Prüfvermerk und Beschlussvorschlag erstellt"},
    {ty:"check",l:"Nach Zulassung: Kennwörter an LWL, Listennummern festgesetzt"},
    {ty:"check",l:"Stimmzettel korrekturgelesen (Namen, Reihenfolge, Vorkumulierungen!) und Druck freigegeben"},
    {ty:"check",l:"Bekanntmachung der zugelassenen Wahlvorschläge bis T−12"}]},
  {t:"5. Direktwahl-Besonderheiten (OB/Ortsvorsteher)",
   info:"OB-Stellenausschreibung bis T−69; bei Eigenbewerbung des OB Wahlleiter-Wechsel nach § 59 KWG; nur ein Bewerber → Ja/Nein-Stimmzettel; keine gültige Bewerbung → Bekanntmachung T−12, dann Ratswahl nach § 53 GemO.",
   items:[
    {ty:"choice",id:"dw57",l:"Direktwahl betroffen?",opts:["Nein","Ja"]},
    {ty:"check",l:"Wahlleiter-Vertretungsfrage geprüft (§ 59 KWG)",showIf:{id:"dw57",eq:"Ja"}},
    {ty:"check",l:"Stimmzettel-Variante geklärt (mehrere Bewerber / Ja-Nein / keine Bewerbung)",showIf:{id:"dw57",eq:"Ja"}},
    {ty:"check",l:"Zweite Ausschusssitzung (Ergebnis/Stichwahl) eingeplant",showIf:{id:"dw57",eq:"Ja"}}]}],
 ergebnis:"Fristgerecht geprüfte und beschiedene Wahlvorschläge; gedruckte, fehlerfreie Stimmzettel; dokumentierte Ausschussarbeit.",
 qualitaet:["Gleichbehandlung aller Wahlvorschlagsträger","Jede Mängelrüge mit Uhrzeit dokumentiert","Zulassungssitzung form- und fristgerecht","Stimmzettel ohne Beanstandung"]},

av58:{id:"av58",b:"b5",nr:"AV 5.8",titel:"Wahltag durchführen, vorläufiges Ergebnis",
 ziel:"Ordnungsgemäßer Wahltag ohne ungeklärte Vorfälle, plausibilisierte Schnellmeldungen und vollständige, gesicherte Niederschriften.",
 ausloeser:["Wahltag / Abstimmungstag / Stichwahltag"],
 grundlagen:["§§ 26–39 KWG, KWO","§§ 46–75 BWO","Schnellmelde-Anweisungen Kreis-/Landeswahlleitung"],
 beteiligte:["Wahl-/Briefwahl-/Auszählungsvorstände","Wahlleiter (OB)","Kreis-/Landeswahlleitung","IT","Pressestelle","Ordnungsamt/Polizei","Bauhof"],
 steps:[
  {t:"1. Vorabend/Morgen: Startklarmachen",
   info:"Materialübergabe an alle Wahlvorsteher VOR 8 Uhr (quittiert); Wahlamts-Lagezentrum besetzen: Hotline, Springer, Ersatzmaterial, Pressekontakt.",
   items:[
    {ty:"check",l:"Alle Wahlkoffer quittiert übergeben (vor 8 Uhr)"},
    {ty:"check",l:"Aushang je Wahlraum (Ort/Zeit der Auszählung) erfolgt"},
    {ty:"check",l:"Funktionstest Erfassungssoftware + Meldewege durchgeführt"},
    {ty:"check",l:"Lagezentrum besetzt (Hotline, Springer, Ersatzmaterial)"}]},
  {t:"2. Wahlzeit 8–18 Uhr: Lage führen",
   info:"Anlaufkontrolle: Beschlussfähigkeit aller Vorstände bis 8 Uhr (Ersatz aus Reserve!). Verbote überwachen: keine Wahlpropaganda/Unterschriftensammlung am Gebäude, keine Veröffentlichung von Nachwahlbefragungen vor 18 Uhr (§ 35 KWG – OWi!).",
   items:[
    {ty:"check",l:"Beschlussfähigkeit aller Vorstände um 8 Uhr bestätigt"},
    {ty:"check",l:"Zwischenstände Wahlbeteiligung erhoben und an Wahlleiter/Presse gegeben"},
    {ty:"check",l:"Hotline-Einzelfälle entschieden und im Lageprotokoll dokumentiert",help:"Wahlschein-Probleme, Zurückweisungen, Hilfspersonen, Ordnung im Wahlraum"},
    {ty:"check",l:"Briefwahllogistik gelaufen: Übergaben ab 10 Uhr, 15-Uhr-Sonderanträge, 18-Uhr-Schluss dokumentiert"}]},
  {t:"3. Ab 18 Uhr: Auszählung und Schnellmeldungen",
   info:"Meldekette: Wahlvorstand → Wahlamt (Erfassung + Plausibilisierung: Summen, Wähler vs. Wahlberechtigte, Vergleich Vorwahl) → Kreis-/Landeswahlleitung. Korrekturen nur dokumentiert und vom Vorstand bestätigt!",
   warn:"Kommunalwahl: Am Wahlabend zuerst die einfachen Wahlen (EP/Direktwahl) auszählen; Ratswahl (Kumulieren/Panaschieren) ggf. ab Folgetag durch Auszählungsvorstände – Versiegelung und Verwahrungskette über Nacht strikt einhalten!",
   items:[
    {ty:"check",l:"Schnellmeldungen erfasst und plausibilisiert (Vier-Augen)"},
    {ty:"check",l:"Auszählreihenfolge bei verbundenen Wahlen eingehalten"},
    {ty:"check",l:"Vorläufiges Ergebnis zusammengestellt; OB/Presse informiert"},
    {ty:"check",l:"Besondere Vorkommnisse im Lageprotokoll erfasst"}]},
  {t:"4. Abschluss Wahltag",
   info:"Erste Sichtung der Niederschriften auf Vollständigkeit – fehlende Unterschriften SOFORT nachfassen, solange die Vorstände greifbar sind.",
   items:[
    {ty:"check",l:"Wahlkoffer/Urnen/Niederschriften gegen Quittung zurückgenommen"},
    {ty:"check",l:"Niederschriften auf Vollständigkeit gesichtet (Unterschriften!)"},
    {ty:"check",l:"Alle Unterlagen sicher verwahrt (versiegelt)"}]}],
 ergebnis:"Ordnungsgemäßer Wahltag ohne ungeklärte Vorfälle; plausibilisiertes vorläufiges Ergebnis; vollständige, gesicherte Niederschriften.",
 qualitaet:["Alle Vorstände jederzeit beschlussfähig","Jede Hotline-Entscheidung mit Rechtsgrundlage im Lageprotokoll","Schnellmeldungen ohne größere Nachkorrekturen","Verwahrungskette lückenlos"]},

av59:{id:"av59",b:"b5",nr:"AV 5.9",titel:"Endgültiges Ergebnis, Wahlprüfung, Nachbereitung",
 ziel:"Bestandskräftiges endgültiges Ergebnis, vollzogene Bekanntmachungen, abgeschlossene Abrechnung/Statistik/Archivierung – ohne formale Angriffsflächen für die Wahlprüfung.",
 ausloeser:["Abgeschlossene Auszählung (AV 5.8)","Einsprüche","Stichwahl-Erfordernis","Abrechnungs- und Statistikpflichten"],
 grundlagen:["§§ 40–52, 72–73 KWG; KWO","§§ 76–90 BWO","Sainte-Laguë/Sperrklausel 3,03 %/Mehrheitsklausel (§§ 41 ff. KWG)"],
 beteiligte:["Wahlausschuss","OB","Stadtrat (Konstituierung)","Kreis-/Landeswahlleitung","Statistisches Landesamt","FB 1.2","GPA/Rechnungsprüfung"],
 steps:[
  {t:"1. Niederschriften prüfen, Ergebnis feststellen",
   info:"Öffentliche Wahlausschusssitzung: Prüfung der ordnungsgemäßen Durchführung, Feststellung des endgültigen Ergebnisses, Sitzverteilung (Sainte-Laguë; Sperrklausel 1/33 = 3,03 %; Mehrheitsklausel), Losentscheide. Bei BTW/LTW/EP: Unterlagen fristgerecht an den Kreiswahlleiter (+1 Tag Schnellweiterleitung, +5 Tage Zusammenstellungen).",
   items:[
    {ty:"check",l:"Alle Niederschriften rechnerisch und formal geprüft (inkl. Beschlüsse über beanstandete Stimmen)"},
    {ty:"check",l:"Wahlausschusssitzung form- und fristgerecht (Ladung, Bekanntmachung, Öffentlichkeit, Niederschrift)"},
    {ty:"check",l:"Sitzverteilung/Feststellung vollzogen bzw. Unterlagen an Kreiswahlleiter weitergeleitet"}]},
  {t:"2. Bekanntmachen und benachrichtigen",
   info:"Die öffentliche Bekanntmachung des Ergebnisses (§ 47 KWG: Sitze je Vorschlag, Namen, Kennwort) startet die ZWEIWÖCHIGE Einspruchsfrist. Stichwahl: unverzüglich Tag + Namen bekanntmachen, 21-Tage-Fenster.",
   items:[
    {ty:"check",l:"Gewählte benachrichtigt (Annahmeerklärung mit Frist; Hinweis auf Unvereinbarkeiten § 5 KWG)"},
    {ty:"check",l:"Ergebnis öffentlich bekannt gemacht"},
    {ty:"choice",id:"sw59",l:"Stichwahl nötig?",opts:["Nein","Ja → AV 5.4/5.8 im 21-Tage-Fenster"]}]},
  {t:"3. Wahlprüfung / Einsprüche (§§ 48–52 KWG)",
   info:"Einsprüche binnen 2 Wochen nach Bekanntmachung. Sachverhalt aufklären (Niederschriften, Zeugen), Vorlage für die Entscheidungsinstanz, Rechtswege überwachen; ggf. Wiederholungswahl (Direktwahlen binnen 3 Monaten).",
   items:[
    {ty:"num",l:"Zahl der Einsprüche"},
    {ty:"check",l:"Einsprüche dokumentiert, aufgeklärt, Entscheidungsvorlage erstellt (falls vorhanden)"}]},
  {t:"4. Konstituierung unterstützen",
   info:"Zuarbeit für die konstituierende Ratssitzung: Mandatsliste, Basisdaten für Ausschussbesetzung (Sainte-Laguë-Logik).",
   items:[
    {ty:"check",l:"Mandatsliste und Ausschussbesetzungs-Basisdaten geliefert"}]},
  {t:"5. Abrechnung, Statistik, Archiv, Lessons Learned",
   info:"Kosten: Erfrischungsgelder/Sachkosten buchen, Erstattungen abrufen (§ 72 KWG pauschal; § 50 BWahlG/§ 25 EuWG über das Land) – GPA-feste Nachweise. Statistik nach § 73 KWG inkl. PARITÄTSSTATISTIK. Vernichtungsfristen: Benachrichtigungen sofort, übrige Unterlagen 6 Monate/60-Tage-Regel (§ 90 BWO bzw. KWO).",
   items:[
    {ty:"check",l:"Kosten gebucht, Erstattungen abgerufen"},
    {ty:"check",l:"Statistikmeldungen inkl. Paritätsstatistik ans Statistische Landesamt"},
    {ty:"check",l:"Interne Wahlanalyse erstellt (Beteiligung je Bezirk, Briefwahlquote → Input AV 5.2)"},
    {ty:"check",l:"Aufbewahrung/Vernichtung terminiert (Protokolle!)"},
    {ty:"check",l:"Nachbereitungsbericht (Lessons Learned je AV) erstellt → Start des nächsten AV 5.1"}]}],
 ergebnis:"Bestandskräftiges endgültiges Ergebnis; vollzogene Bekanntmachungen und Benachrichtigungen; abgeschlossene Abrechnung, Statistik und Archivierung; Nachbereitungsbericht.",
 qualitaet:["Ergebnisfeststellung ohne formale Angriffsflächen","Einspruchsfristen-Management lückenlos","Erstattungen vollständig abgerufen","Bericht fortschreibungsfähig"]},

av510:{id:"av510",b:"b5",nr:"AV 5.10",titel:"Nachrückverfahren und Mandatsänderungen",
 ziel:"Rechtssicher vollzogener Mandatswechsel: Ersatzperson exakt aus dem festgestellten Ergebnis abgeleitet, Wählbarkeit und Unvereinbarkeiten geprüft, alles dokumentiert.",

  {t:"2. Ersatzperson ermitteln",

    {ty:"check",l:"Unvereinbarkeiten geprüft (§ 5 KWG)"}]},
  {t:"4. Annahme einholen",
   info:"Benachrichtigung mit Annahme-/Ablehnungsfrist nach KWG/KWO; bei Ablehnung: nächste Ersatzperson.",
   items:[
    {ty:"check",l:"Benachrichtigung mit Frist versandt"},
    {ty:"choice",l:"Annahme:",opts:["Angenommen","Abgelehnt → nächste Ersatzperson (Schritt 2 wiederholen)"]}]},
  {t:"5. Feststellen, mitteilen, dokumentieren",
   info:"Förmliche Feststellung des Nachrückens; Mitteilungen an Ratsbüro, Fraktion, Betroffene; öffentliche Bekanntmachung; Verpflichtung in der nächsten Ratssitzung anstoßen.",

    {ty:"check",l:"Mitteilungen + öffentliche Bekanntmachung erledigt"},
    {ty:"check",l:"Mandatslisten/Sitzungsdienst aktualisiert; Vorgang beim Wahlergebnis-Aktenbestand dokumentiert"}]}],

 qualitaet:["Reihenfolge exakt aus dem festgestellten Ergebnis","Wählbarkeits-/Unvereinbarkeitsprüfung aktenkundig","Fristen der Annahmeerklärung überwacht"]},

av511:{id:"av511",b:"b5",nr:"AV 5.11",titel:"Bürgerbegehren begleiten, Bürgerentscheid durchführen",
 ziel:"Rechtssicher geprüftes Begehren und ordnungsgemäß durchgeführter Bürgerentscheid – gerichtsfest dokumentiert (Kommunalverfassungsstreit antizipieren).",
 ausloeser:["Ankündigung/Einreichung eines Bürgerbegehrens","Ratsbeschluss über ein Ratsreferendum (§ 17a Abs. 1 S. 2 GemO)","Zugelassenes Begehren → Terminierung"],
 grundlagen:["§ 17a GemO (Stand 2015-Reform)","§§ 67–70 KWG","VV zu § 17a GemO (Kommunalbrevier)","Vault: Bürgerbegehren und Bürgerentscheid RLP"],
 beteiligte:["Vertretungsberechtigte des Begehrens","Stadtrat","OB","Betroffener Fachbereich","Stabsstelle Recht","Kommunalaufsicht","Kämmerei","Pressestelle"],
 steps:[
  {t:"1. Frühphase: beraten und vorbereiten",
   info:"Neutrale Verfahrensberatung ist zulässig und sinnvoll (Ja/Nein-Frage, Fristen, Quorum, Form). Kassatorische Begehren: 4-Monats-Frist ab Ratsbeschluss! Kein Vollzugsstopp kraft Gesetzes – aber Eskalationsrisiko (einstweilige Anordnung) mit der Leitung besprechen.",
   items:[
    {ty:"choice",l:"Typ des Begehrens:",opts:["Initiierend (keine Frist)","Kassatorisch (4 Monate ab Ratsbeschluss!)","Ratsreferendum"]},
    {ty:"check",l:"Kontakt mit Vertretungsberechtigten aufgenommen; neutral beraten (dokumentiert)"},
    {ty:"check",l:"OB/Büroleiter + betroffener Fachbereich informiert; Vollzugsfrage geklärt"},
    {ty:"date",l:"Bei kassatorischem Begehren: Datum des angegriffenen Ratsbeschlusses"}]},
  {t:"2. Eingang und Unterschriftenprüfung",
   info:"Eingangsdatum = Fristwahrung! Prüfung nach § 17a Abs. 4: Wahlberechtigung jedes Unterzeichners (Melderegister), zweifelsfreie Identifizierbarkeit, Doppelungen, voller Wortlaut auf jeder Liste. Der Rechner ermittelt das Quorum.",
   items:[
    {ty:"check",l:"Eingang dokumentiert; Listen gesichert (Zugriff nur Prüfteam)"},
    {ty:"calc",kind:"quorum",l:"Quorums-Rechner (10 % Unterschriften / 15 % Zustimmung)"},
    {ty:"num",l:"Gültige Unterschriften (gezählt)"},
    {ty:"check",l:"Prüfvermerk mit Zählwerk erstellt (gültig/ungültig nach Grund)"}]},
  {t:"3. Zulässigkeitsprüfung und Ratsentscheidung",
   info:"Prüfschema: Gemeindeangelegenheit? Negativkatalog § 17a Abs. 2 (u. a. Bauleitpläne, Haushaltssatzung, innere Organisation)? Frist? Form (Ja/Nein-Frage, Begründung, ≤ 3 Vertreter)? 3-Jahres-Sperrfrist? – Seit 2015: KEIN Kostendeckungsvorschlag mehr, stattdessen Kostenschätzung der VERWALTUNG (mit Aufsichtsbehörde abgestimmt, Vertreter vorher anhören).",
   items:[
    {ty:"choice",l:"Negativkatalog verletzt?",opts:["Nein","Ja → unzulässig (Punkt benennen)"]},
    {ty:"check",l:"Form geprüft (Ja/Nein-Frage, Begründung, Vertretungsberechtigte, Wortlaut auf Listen)"},
    {ty:"check",l:"3-Jahres-Sperrfrist geprüft"},
    {ty:"check",l:"Kostenschätzung der Verwaltung erstellt und mit Aufsichtsbehörde abgestimmt; Vertreter angehört"},
    {ty:"check",l:"Beschlussvorlage (reine Rechtsfrage!) erstellt; Anhörung der Vertretungsberechtigten im Rat organisiert"},
    {ty:"choice",id:"rat511",l:"Ratsentscheidung:",opts:["Zugelassen → Bürgerentscheid","Maßnahme übernommen/Kompromiss → Entscheid entfällt (§ 17a Abs. 5)","Nicht zugelassen → Bescheid mit RB-Belehrung"]}]},
  {t:"4. Bürgerentscheid organisieren (bei Zulassung)",
   info:"Wie eine Direktwahl (§ 67 KWG): Verzeichnis, Benachrichtigung, Briefabstimmung, Stimmbezirke, Vorstände, Ja/Nein-Stimmzettel ohne Zusätze. Bekanntmachung nach § 68 Abs. 2 KWG AUSGEWOGEN: Begründung der Antragsteller UND Auffassungen der Gemeindeorgane (inkl. Minderheiten) + Kostenschätzung.",
   items:[
    {ty:"check",l:"Terminvorschlag für Ratsbeschluss erstellt (unverzüglich; Sonntag; Kopplung mit Wahltag nur mit Zustimmung der Aufsichtsbehörde)",showIf:{id:"rat511",eq:"Zugelassen → Bürgerentscheid"}},
    {ty:"check",l:"Ausgewogene Bekanntmachung erstellt und abgestimmt",showIf:{id:"rat511",eq:"Zugelassen → Bürgerentscheid"}},
    {ty:"check",l:"Wahlorganisation aufgesetzt (AV 5.2–5.6, 5.8 sinngemäß)",showIf:{id:"rat511",eq:"Zugelassen → Bürgerentscheid"}},
    {ty:"check",l:"Bei mehreren Entscheiden am selben Tag: Stichfrage vom Rat beschlossen",showIf:{id:"rat511",eq:"Zugelassen → Bürgerentscheid"}}]},
  {t:"5. Ergebnis und Vollzug",
   info:"Erfolgsprüfung: Mehrheit der gültigen Stimmen UND ≥ 15 % der Stimmberechtigten. Erfolgreich = steht einem Ratsbeschluss gleich, 3 Jahre Bindung. Quorum verfehlt → der Rat entscheidet.",
   items:[
    {ty:"choice",l:"Ausgang:",opts:["Erfolgreich (Mehrheit + 15 %-Quorum)","Mehrheit ohne Quorum → Rat entscheidet","Abgelehnt"]},
    {ty:"check",l:"Wahlausschuss-Feststellung, Unterrichtung des Rats, Bekanntmachung erfolgt (§ 70 KWG)"},
    {ty:"check",l:"Bindungs-/Sperrfristen-Register fortgeschrieben (3 Jahre)"},
    {ty:"check",l:"Vollzugscontrolling beim Fachbereich angestoßen (bei Erfolg)"}]}],
 ergebnis:"Rechtssicher geprüftes Begehren; ordnungsgemäß durchgeführter Bürgerentscheid; dokumentierte Bindungs- und Sperrfristen.",

/* ---------- Pure Rechenfunktionen (auch für Tests) ---------- */
function fmtNum(x,dec){if(x===null||x===undefined||isNaN(x))return"–";
  return x.toLocaleString("de-DE",{minimumFractionDigits:dec??0,maximumFractionDigits:dec??2});}
function calcPBE(rows,vz,jazStd){ /* rows:[{name,menge,mbz}] vz:% jaz:Std/Jahr */
  const jazMin=jazStd*60; let sumMin=0; const det=rows.map(r=>{
    const m=(Number(r.menge)||0)*(Number(r.mbz)||0)*(1+(Number(vz)||0)/100);
    sumMin+=m; return {name:r.name||"Aufgabe",min:m,vza:jazMin>0?m/jazMin:0};});
  return {rows:det,sumMin:sumMin,sumStd:sumMin/60,vza:jazMin>0?sumMin/jazMin:0};}
function calcKW(a){ /* {inv,kost,erl,rest,jahre,zins} → Kapitalwert */
  const i=(Number(a.zins)||0)/100, n=Number(a.jahre)||1;
  let kw=-(Number(a.inv)||0);
  for(let t=1;t<=n;t++){kw+=((Number(a.erl)||0)-(Number(a.kost)||0))/Math.pow(1+i,t);}
  kw+=(Number(a.rest)||0)/Math.pow(1+i,n); return kw;}
function calcQuorumBB(wahlber){const q=Math.ceil((Number(wahlber)||0)*0.10);
  return {roh:q,mass:Math.min(q,3000),cap:q>3000};}
function calcQuorumBE(stimmber){return Math.ceil((Number(stimmber)||0)*0.15);}
function calcHelfer(u,ug,b,bg,res){const basis=(Number(u)||0)*(Number(ug)||0)+(Number(b)||0)*(Number(bg)||0);
  return {basis:basis,reserve:Math.ceil(basis*(Number(res)||0)/100),gesamt:basis+Math.ceil(basis*(Number(res)||0)/100)};}
function addDays(iso,d){const dt=new Date(iso+"T12:00:00");dt.setDate(dt.getDate()+d);return dt;}
function fmtDate(dt){const wd=["So","Mo","Di","Mi","Do","Fr","Sa"][dt.getDay()];
  return wd+", "+String(dt.getDate()).padStart(2,"0")+"."+String(dt.getMonth()+1).padStart(2,"0")+"."+dt.getFullYear();}

function calcFristen(art,iso){const list=FRISTEN[art]||[];
  return list.map(f=>({tx:f[0],label:f[1],rg:f[2],key:f[3]===1,date:addDays(iso,f[0])}));}
function runTests(){const out=[];
  const p=calcPBE([{name:"A",menge:1000,mbz:30}],12,1600);
  out.push(["PBE 1000×30min +12% / 1600h", Math.abs(p.vza-0.35)<0.001]);
  const kw=calcKW({inv:10000,kost:2000,erl:0,rest:1000,jahre:5,zins:3});
  out.push(["KW berechnet (negativ, plausibel)", kw<0 && kw>-25000]);
  const q=calcQuorumBB(15000); out.push(["Quorum BB 15000→1500", q.mass===1500]);
  const q2=calcQuorumBB(40000); out.push(["Quorum BB Kappung 3000", q2.mass===3000]);
  out.push(["Quorum BE 15% von 13000→1950", calcQuorumBE(13000)===1950]);
  const h=calcHelfer(12,7,6,6,15); out.push(["Helfer 12×7+6×6+15%", h.gesamt===138]);
  const fr=calcFristen("kw","2029-06-10");
  out.push(["Fristen KW: T-48 = 23.04.2029", fmtDate(fr.find(x=>x.tx===-48).date).indexOf("23.04.2029")>-1]);
  out.push(["Fristen BTW vorhanden", calcFristen("btw","2029-03-11").length>10]);
  return out;}

/* ---------- State & Persistenz ---------- */
let S={view:"home",bId:null,avId:null,step:0,answers:{},snap:{},search:""};
function saveS(){try{localStorage.setItem("avapp3",JSON.stringify({answers:S.answers}));}catch(e){}}
function loadS(){try{const x=JSON.parse(localStorage.getItem("avapp3")||"{}");
  if(x.answers)S.answers=x.answers;}catch(e){}}
function ans(){if(!S.answers[S.avId])S.answers[S.avId]={};return S.answers[S.avId];}
function ansOf(av){return S.answers[av]||{};}

/* ---------- Utils ---------- */
function $(id){return document.getElementById(id);}
function h(tag,attrs,kids){const e=document.createElement(tag);
  if(attrs)for(const k in attrs){if(k==="class")e.className=attrs[k];
    else if(k==="html")e.innerHTML=attrs[k];
    else if(k.startsWith("on"))e.addEventListener(k.slice(2),attrs[k]);
    else e.setAttribute(k,attrs[k]);}
  (kids||[]).forEach(c=>{if(c==null)return;
    e.appendChild(typeof c==="string"?document.createTextNode(c):c);});return e;}
function toast(msg){const t=$("toast");t.textContent=msg;t.classList.add("show");
  clearTimeout(t._tm);t._tm=setTimeout(()=>t.classList.remove("show"),2200);}
function esc(s){return String(s??"");}
function itemKey(si,ii,it){return it.id||("s"+si+"i"+ii);}
function visible(it){if(!it.showIf)return true;const v=ans()[it.showIf.id];
  if(Array.isArray(v))return v.indexOf(it.showIf.eq)>-1;return v===it.showIf.eq;}
function stepDoneCount(av){let n=0;const a=S.answers[av.id]||{};
  av.steps.forEach((st,si)=>{const done=st.items.some((it,ii)=>{const k=itemKey(si,ii,it);
    return a[k]!==undefined&&a[k]!==""&&a[k]!==null;});if(done)n++;});return n;}

/* ---------- Navigation ---------- */
function goHome(){if(S.view==="step"&&!confirm("Zur Startseite? Deine Eingaben bleiben gespeichert."))return;
  S.view="home";S.bId=null;S.avId=null;render();}
function openBereich(id){S.view="bereich";S.bId=id;render();}
function openAV(id){S.avId=id;S.bId=AVS[id].b;S.view="intro";S.step=0;render();}
function cancelAV(){if(confirm("Arbeitsvorgang abbrechen? Eingaben bleiben gespeichert, du kannst später fortsetzen."))
  {S.view="bereich";render();}}
function startAV(){S.view="step";S.step=0;snapStep();render();}
function nextStep(){const av=AVS[S.avId];
  if(S.step<av.steps.length-1){S.step++;snapStep();render();window.scrollTo(0,0);}
  else{S.view="done";render();window.scrollTo(0,0);}}
function prevStep(){if(S.step>0){S.step--;render();window.scrollTo(0,0);}
  else{S.view="intro";render();window.scrollTo(0,0);}}
function snapStep(){const av=AVS[S.avId];const st=av.steps[S.step];const snap={};
  st.items.forEach((it,ii)=>{const k=itemKey(S.step,ii,it);
    if(ans()[k]!==undefined)snap[k]=JSON.parse(JSON.stringify(ans()[k]));});
  if(!S.snap[S.avId])S.snap[S.avId]={};S.snap[S.avId][S.step]=snap;}
function undoStep(){const av=AVS[S.avId];const st=av.steps[S.step];
  const snap=(S.snap[S.avId]||{})[S.step]||{};
  st.items.forEach((it,ii)=>{const k=itemKey(S.step,ii,it);
    if(snap[k]!==undefined)ans()[k]=JSON.parse(JSON.stringify(snap[k]));else delete ans()[k];});
  saveS();render();toast("↺ Schritt zurückgesetzt");}

    rows.forEach(r=>{const rc=h("div",{class:"card",style:"padding:10px;margin:8px 0"});
      rc.appendChild(h("div",{class:"ilabel",style:"font-size:14px"},[r.m]));
      const sel=h("select",{onchange:e=>{r.s=e.target.value;saveS();refreshCalcs();}});
      sel.appendChild(h("option",{value:""},["Stufe wählen …"]));
      for(let s=1;s<=8;s++){const o=h("option",{value:String(s)},["Stufe "+s]);
        if(String(s)===r.s)o.setAttribute("selected","");sel.appendChild(o);}
      rc.appendChild(sel);
      rc.appendChild(h("input",{type:"number",inputmode:"numeric",placeholder:"Punkte lt. KGSt-Tabelle",
        value:r.p,oninput:e=>{r.p=e.target.value;saveS();refreshCalcs();}}));
      box.appendChild(rc);});
    const sum=rows.reduce((s,r)=>s+(Number(r.p)||0),0);
    const out=h("div",{class:"calcout"});
    out.appendChild(h("div",null,["Summe Wertzahl: ",h("b",null,[fmtNum(sum,0)+" Punkte"])]));
    out.appendChild(h("div",{class:"small"},["→ Besoldungsgruppe über die KGSt-Dienstpostentabelle ablesen und mit passendem Musterbogen GK 6 (Vault: Übersicht KGSt-Musterbewertungen) plausibilisieren."]));
    box.appendChild(out);
    a[k]="KGSt-Wertzahl: "+sum+" P. (Stufen: "+rows.map(r=>r.s||"–").join("/")+")";saveS();
    return box;}
  return h("div",{class:"small"},["(Modul nicht gefunden)"]);}

/* ---------- Abschluss ---------- */
function vDone(m){const av=AVS[S.avId];
  renderHeader(av.nr+" · Abschluss",av.titel,1,true);
  renderFooter({back:()=>{S.view="step";S.step=av.steps.length-1;render();}});
  const c=h("div",{class:"card"});
  c.appendChild(h("div",{class:"done-icon"},["🏁"]));
  c.appendChild(h("h2",{class:"center"},["Abschluss & Qualitätskontrolle"]));
  c.appendChild(h("div",{class:"info"},[h("b",null,["🎯 Ergebnis dieses Arbeitsvorgangs: "]),av.ergebnis]));
  c.appendChild(h("h3",null,["Qualitätsmaßstäbe – vor dem Absenden prüfen:"]));
  av.qualitaet.forEach((q,i)=>{const k="_q"+i;const v=ans()[k]===true;
    c.appendChild(h("div",{class:"qmrow checkrow"+(v?" on":""),onclick:()=>{
      ans()[k]=!v||undefined;if(!ans()[k])delete ans()[k];saveS();render();}},[
      h("div",{class:"cbox"},[v?"✓":""]),h("div",null,[q])]));});
  m.appendChild(c);
  const proto=buildProtocol(av);
  const c2=h("div",{class:"card"});
  c2.appendChild(h("h3",null,["📋 Ergebnis & Weg (Protokoll)"]));
  c2.appendChild(h("div",{class:"hint"},["Kann direkt in E-Mail, Vermerk oder Akte eingefügt werden."]));
  const ta=h("textarea",{style:"min-height:200px;font-size:13px",readonly:""},[proto]);
  c2.appendChild(ta);
  c2.appendChild(h("button",{class:"btn bok",onclick:()=>{copyText(proto,ta);}},["📋 Ergebnis & Weg kopieren"]));
  c2.appendChild(h("button",{class:"btn bsec",onclick:()=>{S.view="bereich";render();toast("Eingaben bleiben gespeichert");}},["Zurück zur Übersicht"]));
  c2.appendChild(h("button",{class:"btn bdanger",onclick:()=>{
    if(confirm("Eingaben dieses Arbeitsvorgangs löschen und neu starten?")){delete S.answers[S.avId];saveS();S.view="intro";render();}}},
    ["🗑 Zurücksetzen & neu starten"]));
  m.appendChild(c2);}
function copyText(txt,ta){const ok=()=>toast("✓ In die Zwischenablage kopiert");
  if(navigator.clipboard&&navigator.clipboard.writeText){
    navigator.clipboard.writeText(txt).then(ok).catch(()=>{fallbackCopy(ta);ok();});}
  else{fallbackCopy(ta);ok();}}
function fallbackCopy(ta){ta.focus();ta.select();ta.setSelectionRange(0,999999);
  try{document.execCommand("copy");}catch(e){}}
function buildProtocol(av){const a=ansOf(av.id);const b=BEREICHE.find(x=>x.id===av.b);
  const L=[];const now=new Date();
  L.push("PROTOKOLL – "+av.nr+" "+av.titel);
  L.push("Aufgabengebiet: Bereich "+b.nr+" – "+b.titel);
  L.push("Erstellt: "+fmtDate(now)+", "+String(now.getHours()).padStart(2,"0")+":"+String(now.getMinutes()).padStart(2,"0")+" Uhr · Arbeitsvorgänge-App (Datenstand 03.07.2026)");
  L.push("=".repeat(46));
  const ausl=a["_ausloeser"]||[];
  L.push("AUSLÖSER: "+(ausl.length?ausl.join("; "):"(nicht angegeben)"));
  av.steps.forEach((st,si)=>{L.push("");L.push("SCHRITT "+(si+1)+": "+st.t);
    st.items.forEach((it,ii)=>{const k=itemKey(si,ii,it);
      if(it.showIf){const dep=a[it.showIf.id];
        const vis=Array.isArray(dep)?dep.indexOf(it.showIf.eq)>-1:dep===it.showIf.eq;
        if(!vis)return;}
      const v=a[k];
      if(it.ty==="check"){L.push("  ["+(v===true?"✓":v==="na"?"n. z.":"offen")+"] "+it.l);}
      else if(it.ty==="choice"){if(v!==undefined&&v!==null&&String(v).length)
        L.push("  • "+it.l+" → "+(Array.isArray(v)?v.join(", "):v));
        else L.push("  • "+it.l+" → (offen)");}
      else if(it.ty==="calc"){L.push("  ▸ "+it.l+": "+(v||"(nicht berechnet)"));
        if(a[k+"_proto"])a[k+"_proto"].split("\n").forEach(x=>L.push("      "+x));}
      else{if(v!==undefined&&v!==""&&v!==null)L.push("  • "+it.l+": "+v);
        else L.push("  • "+it.l+": (offen)");}});});
  L.push("");L.push("QUALITÄTSMASSSTÄBE:");
  av.qualitaet.forEach((q,i)=>L.push("  ["+(a["_q"+i]===true?"✓":"offen")+"] "+q));
  L.push("");L.push("ERGEBNIS (Soll): "+av.ergebnis);
  L.push("");L.push("Beteiligte/Schnittstellen: "+av.beteiligte.join("; "));
  L.push("Grundlagen: "+av.grundlagen.join("; "));
  return L.join("\n");}

if(typeof document!=="undefined"&&document.getElementById("main")){
  loadS();render();}

   bei direktem Öffnen der Datei (file://) läuft die App ohne SW weiter. */

  location.hostname==="localhost"||location.hostname==="127.0.0.1")){
  addEventListener("load",()=>{navigator.serviceWorker.register("sw.js").catch(()=>{});});}
